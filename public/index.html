<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alma 1 Menu iCal</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: "Alegreya Sans", "Source Sans Pro", "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        background: linear-gradient(160deg, #f6f2ea 0%, #f3f8f7 100%);
        color: #1a2b2b;
      }
      main {
        max-width: 720px;
        margin: 64px auto;
        background: #ffffff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(11, 36, 36, 0.12);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.6;
      }
      .cta {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        background: #1b6d5c;
        color: #ffffff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
      }
      code {
        background: #f1f4f3;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Alma 1 Menu iCal</h1>
      <p>Deze pagina host de iCal-feed met de menu’s van Alma 1 op donderdagen.</p>
      <p>Voeg de feed toe in je agenda via:</p>
      <p><code>alma.ics</code></p>
      <a class="cta" href="alma.ics">Open de iCal-feed</a>
    </main>
  </body>
</html>
